<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=./#referral-module" />
<link rel="canonical" href="./#referral-module" />
<title>Refer to IHL | Institute for Healthy Living</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--ihl-paper);
    color: var(--ihl-ink);
    font-family: var(--sans);
  }
  main {
    width: min(560px, calc(100% - 40px));
    padding: 32px;
    border: 1px solid var(--ihl-rule);
    border-radius: var(--r-3);
    background: var(--ihl-paper);
  }
  h1 {
    margin: 0 0 12px;
    font-family: var(--serif);
    font-weight: 400;
    font-size: 32px;
    line-height: 1.1;
  }
  p {
    margin: 0 0 18px;
    color: var(--ihl-ink-soft);
  }
  a {
    color: var(--ihl-ink);
    text-underline-offset: 3px;
  }
</style>
</head>
<body>
<main>
  <h1>Continue to the referral pathway.</h1>
  <p>The referral form now sits inside the main referrer gateway.</p>
  <a href="./#referral-module">Open referral pathway</a>
</main>
</body>
</html>
